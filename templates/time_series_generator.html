<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>时序数据生成</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #121212;
            color: #fff;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .container {
            flex: 1;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            padding-top: 60px;
        }

        h1 {
            color: #3498db;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #999;
            font-size: 18px;
        }

        .main-content {
            background-color: #1e1e1e;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.3);
            border: 2px solid #3498db;
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .btn {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        .btn:hover {
            background-color: #2980b9;
        }

        .btn:disabled {
            background-color: #7f8c8d;
            cursor: not-allowed;
        }

        .btn.secondary {
            background-color: #95a5a6;
        }

        .btn.secondary:hover {
            background-color: #7f8c8d;
        }

        .btn.danger {
            background-color: #e74c3c;
        }

        .btn.danger:hover {
            background-color: #c0392b;
        }

        .btn-primary {
            background-color: #27ae60;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        .btn-primary:hover {
            background-color: #219653;
        }

        .progress-container {
            margin-top: 20px;
        }

        .progress-bar {
            width: 100%;
            height: 20px;
            background-color: #333;
            border-radius: 5px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background-color: #27ae60;
            transition: width 0.3s ease;
            width: 0%;
        }

        .progress-text {
            margin-top: 5px;
            text-align: center;
            color: #fff;
        }

        .status-message {
            padding: 10px;
            border-radius: 4px;
            margin-top: 20px;
            display: none;
        }

        .success {
            background-color: #27ae60;
            color: white;
        }

        .error {
            background-color: #e74c3c;
            color: white;
        }

        .info {
            background-color: #3498db;
            color: white;
        }

        .side-floating-btn {
            position: fixed;
            top: 50%;
            transform: translateY(-50%);
            width: 60px;
            height: 200px;
            border: none;
            border-radius: 0 10px 10px 0;
            color: white;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            writing-mode: vertical-rl;
            text-orientation: mixed;
            z-index: 1000;
            display: none; /* 默认隐藏，登录后显示 */
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .logged-in .side-floating-btn {
            display: flex;
        }

        .side-floating-btn:hover {
            width: 80px;
        }

        .side-floating-btn-left {
            left: 0;
            background-color: #3498db;
        }

        .side-floating-btn-right {
            right: 0;
            background-color: #27ae60;
        }

        .left-menu {
            position: fixed;
            left: -300px;
            top: 0;
            width: 300px;
            height: 100vh;
            background-color: #1e1e1e;
            border-right: 2px solid #3498db;
            transition: left 0.3s ease;
            z-index: 2000;
            padding: 20px;
            box-sizing: border-box;
        }

        .left-menu.active {
            left: 0;
        }

        .right-menu {
            position: fixed;
            right: -500px;
            top: 0;
            width: 500px;
            height: 100vh;
            background-color: #1e1e1e;
            border-left: 2px solid #3498db;
            transition: right 0.3s ease;
            z-index: 2000;
            padding: 20px;
            box-sizing: border-box;
            overflow-y: auto;
        }

        .right-menu.active {
            right: 0;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            z-index: 1500;
            display: none;
        }

        .overlay.active {
            display: block;
        }

        .menu-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .menu-title {
            font-size: 20px;
            font-weight: bold;
            color: #3498db;
        }

        .close-btn {
            background: none;
            border: none;
            color: #fff;
            font-size: 24px;
            cursor: pointer;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        .form-group select, .form-group input {
            width: 100%;
            padding: 8px;
            border-radius: 4px;
            border: 1px solid #3498db;
            background-color: #333;
            color: #fff;
            box-sizing: border-box;
        }

        .save-btn {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 20px;
        }

        .save-btn:hover {
            background-color: #2980b9;
        }

        .selection-status {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status-label {
            font-weight: bold;
            color: #999;
        }

        .status-value {
            font-weight: bold;
            color: #3498db;
        }

        .result-section {
            margin-top: 30px;
        }

        .result-section h2 {
            color: #3498db;
            margin-bottom: 20px;
        }

        .result-content {
            background-color: #2a2a2a;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #3498db;
            max-height: 400px;
            overflow-y: auto;
        }

        .result-item {
            margin-bottom: 10px;
            padding: 10px;
            border-radius: 4px;
        }

        .result-item.success {
            background-color: rgba(39, 174, 96, 0.2);
            border-left: 4px solid #27ae60;
        }

        .result-item.error {
            background-color: rgba(231, 76, 60, 0.2);
            border-left: 4px solid #e74c3c;
        }

        .result-item.info {
            background-color: rgba(52, 152, 219, 0.2);
            border-left: 4px solid #3498db;
        }

        .download-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .login-section {
            position: absolute;
            top: 20px;
            right: 20px;
        }

        .login-btn {
            background-color: #27ae60;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }

        .login-btn:hover {
            background-color: #219653;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logout-btn {
            background-color: #e74c3c;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }

        .logout-btn:hover {
            background-color: #c0392b;
        }

        .access-denied {
            background-color: #1a1a2e;
            color: #e74c3c;
            padding: 40px 60px;
            border-radius: 12px;
            text-align: center;
            margin: 50px auto;
            border: 2px solid #3498db;
            max-width: 400px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .access-denied h3 {
            margin-bottom: 15px;
            font-size: 24px;
            color: #3498db;
        }

        .access-denied p {
            color: #bdc3c7;
            margin-bottom: 25px;
            font-size: 16px;
        }

        .login-form {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .login-form div {
            display: flex;
            align-items: center;
            width: 100%;
            max-width: 280px;
        }

        .login-form label {
            width: 80px;
            text-align: right;
            margin-right: 15px;
            color: #bdc3c7;
            font-size: 14px;
        }

        .login-form input {
            flex: 1;
            padding: 10px 12px;
            border: 1px solid #3498db;
            border-radius: 6px;
            background-color: #2a2a2a;
            color: #fff;
            font-size: 14px;
            outline: none;
            transition: border-color 0.3s;
        }

        .login-form input:focus {
            border-color: #2980b9;
        }

        .login-form .btn {
            margin-top: 10px;
            padding: 10px 40px;
            font-size: 16px;
        }

        .login-error {
            color: #e74c3c;
            font-size: 14px;
            margin-top: 10px;
        }

        .bottom-floating-window {
            position: fixed;
            bottom: -500px;
            left: 0;
            width: 100%;
            height: 400px;
            background-color: #1e1e1e;
            border-top: 3px solid #3498db;
            transition: bottom 0.3s ease;
            z-index: 3000;
            display: flex;
            flex-direction: column;
        }

        .bottom-floating-window.active {
            bottom: 0;
        }

        .bottom-window-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background-color: #2a2a2a;
            border-bottom: 1px solid #3498db;
        }

        .bottom-window-header h3 {
            margin: 0;
            color: #3498db;
            font-size: 18px;
        }

        .close-bottom-btn {
            background: none;
            border: none;
            color: #fff;
            font-size: 28px;
            cursor: pointer;
            padding: 0;
            line-height: 1;
        }

        .close-bottom-btn:hover {
            color: #e74c3c;
        }

        .bottom-window-content {
            flex: 1;
            overflow-y: auto;
            padding: 15px 20px;
        }

        .toggle-bottom-btn {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background-color: #3498db;
            color: white;
            border: none;
            padding: 10px 30px;
            font-size: 16px;
            border-radius: 20px;
            cursor: pointer;
            z-index: 2500;
            display: none;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
        }

        .toggle-bottom-btn:hover {
            background-color: #2980b9;
        }

        .simulation-result-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .result-card {
            background-color: #2a2a2a;
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid #27ae60;
        }

        .result-card.error {
            border-left-color: #e74c3c;
        }

        .result-card h4 {
            margin: 0 0 10px 0;
            color: #3498db;
            font-size: 14px;
        }

        .result-card .result-detail {
            font-size: 12px;
            color: #ccc;
            margin: 5px 0;
        }

        .result-card .result-voltage {
            font-size: 16px;
            font-weight: bold;
            color: #27ae60;
            margin-top: 8px;
        }

        .result-card.error .result-voltage {
            color: #e74c3c;
        }

        .chart-floating-window {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            width: 90%;
            max-width: 1000px;
            height: 80%;
            max-height: 600px;
            background-color: #1e1e1e;
            border: 3px solid #3498db;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s ease;
            z-index: 4000;
            display: flex;
            flex-direction: column;
        }

        .chart-floating-window.active {
            transform: translate(-50%, -50%) scale(1);
        }

        .chart-window-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background-color: #2a2a2a;
            border-bottom: 1px solid #3498db;
            border-radius: 8px 8px 0 0;
        }

        .chart-window-header h3 {
            margin: 0;
            color: #3498db;
            font-size: 18px;
        }

        .close-chart-btn {
            background: none;
            border: none;
            color: #fff;
            font-size: 28px;
            cursor: pointer;
            padding: 0;
            line-height: 1;
        }

        .close-chart-btn:hover {
            color: #e74c3c;
        }

        .chart-window-content {
            flex: 1;
            overflow: hidden;
            padding: 20px;
        }

        .chart-controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .chart-control-btn {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            transition: background-color 0.3s ease;
        }

        .chart-control-btn:hover {
            background-color: #2980b9;
        }

        .chart-control-btn.active {
            background-color: #27ae60;
        }

        .chart-container {
            width: 100%;
            height: calc(100% - 50px);
            position: relative;
        }

        .chart-toggle-btn {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background-color: #27ae60;
            color: white;
            border: none;
            padding: 10px 30px;
            font-size: 16px;
            border-radius: 20px;
            cursor: pointer;
            z-index: 2500;
            display: none;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
        }

        .chart-toggle-btn:hover {
            background-color: #219653;
        }
    </style>
</head>
<body>
    <div class="login-section" id="userInfoSection" style="display: none;">
        <div class="user-info">
            <span id="userName">用户</span>
            <button class="logout-btn" onclick="logout()">登出</button>
        </div>
    </div>

    <button class="side-floating-btn side-floating-btn-left" onclick="openLeftMenu()">选择区段/故障类型</button>
    <button class="side-floating-btn side-floating-btn-right" onclick="openParameterWindow()">参数设置</button>

    <div class="overlay" id="overlay"></div>

    <div class="left-menu" id="leftMenu">
        <div class="menu-header">
            <h2 class="menu-title">选择轨道区段和故障类型</h2>
            <button class="close-btn" onclick="closeLeftMenu()">&times;</button>
        </div>
        <div class="form-group">
            <label for="trackSection">轨道区段:</label>
            <select id="trackSection" name="trackSection" onchange="onTrackSectionChange()">
                <option value="">请选择轨道区段</option>
                <option value="69G">69G</option>
                <option value="X1LQG">X1LQG</option>
                <option value="IG1">IG1</option>
                <option value="57G">57G</option>
                <option value="3DG">3DG</option>
            </select>
        </div>
        <div class="form-group">
            <label for="faultType">故障类型:</label>
            <select id="faultType" name="faultType">
                <option value="0">无故障</option>
                <option value="1">接收端调谐单元1断路</option>
                <option value="2">发送端调谐单元1断路</option>
                <option value="3">接收端空心线圈断路</option>
                <option value="4">接收端空芯线圈短路</option>
                <option value="5">接收端调谐单元2断路</option>
                <option value="6">补偿电容3断路</option>
                <option value="7">补偿电容3短路</option>
            </select>
        </div>
        <button class="save-btn" onclick="saveSelection()">保存选择</button>
    </div>

    <div class="right-menu" id="rightMenu">
        <div class="menu-header">
            <h2 class="menu-title">参数设置</h2>
            <button class="close-btn" onclick="closeParameterWindow()">&times;</button>
        </div>
        <div class="form-group">
            <label for="trackName">轨道名称:</label>
            <input type="text" id="trackName" name="trackName" value="测试轨道">
        </div>
        <div class="form-group">
            <label for="trackLength">轨道长度 (m):</label>
            <input type="number" id="trackLength" name="trackLength" value="1200.0" step="0.1">
        </div>
        <div class="form-group">
            <label for="resistance">电阻 (Ω/m):</label>
            <input type="number" id="resistance" name="resistance" value="0.1" step="0.01">
        </div>
        <div class="form-group">
            <label for="inductance">电感 (H/m):</label>
            <input type="number" id="inductance" name="inductance" value="0.001" step="0.0001">
        </div>
        <div class="form-group">
            <label for="capacitance">电容 (F/m):</label>
            <input type="number" id="capacitance" name="capacitance" value="1e-9" step="1e-10">
        </div>
        <div class="form-group">
            <label for="leakageResistance">漏电阻抗 (Ω·km):</label>
            <input type="number" id="leakageResistance" name="leakageResistance" value="1.0" step="0.1">
        </div>
        <div class="form-group">
            <label for="cableLength">电缆长度 (km):</label>
            <input type="number" id="cableLength" name="cableLength" value="10.0" step="0.1">
        </div>
        <div class="form-group">
            <label for="errorValue">故障值:</label>
            <input type="number" id="errorValue" name="errorValue" value="1.0" step="0.1">
        </div>
        <div class="form-group">
            <label for="r1">R1:</label>
            <input type="number" id="r1" name="r1" value="1" step="1">
        </div>
        <div class="form-group">
            <label for="r2">R2:</label>
            <input type="number" id="r2" name="r2" value="1" step="1">
        </div>
        <div class="form-group">
            <label for="voltageLevel">发送端电平档位:</label>
            <select id="voltageLevel" name="voltageLevel">
                <option value="1">1档 (161-170V)</option>
                <option value="2">2档 (146-154V)</option>
                <option value="3" selected>3档 (128-135V)</option>
                <option value="4">4档 (104.5-110.5V)</option>
                <option value="5">5档 (75-79.5V)</option>
                <option value="6">6档 (75-170V)</option>
            </select>
        </div>
        <div class="form-group">
            <label for="voltageCount">数据个数:</label>
            <input type="number" id="voltageCount" name="voltageCount" value="15" min="1" max="100" step="1">
        </div>
        <div class="form-group">
            <label for="useRandomVoltage">随机电压:</label>
            <input type="checkbox" id="useRandomVoltage" name="useRandomVoltage">
        </div>
        <button class="save-btn" onclick="saveParameters()">保存参数</button>
    </div>

    <div class="container">
        <header>
            <h1>时序数据生成</h1>
            <p class="subtitle">铁路轨道电路故障模拟系统</p>
        </header>

        <div class="main-content">
            <div class="controls">
                <button class="btn btn-primary" id="startSimulationBtn" onclick="startTimeSeriesSimulation()">开始时序数据生成</button>
                <button class="btn btn-danger" id="stopSimulationBtn" onclick="stopTimeSeriesSimulation()" disabled>停止生成</button>
                <button class="btn btn-secondary" onclick="clearResults()">清空结果</button>
            </div>

            <div class="progress-container">
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <div class="progress-text" id="progressText">准备开始...</div>
            </div>

            <div class="selection-status">
                <div class="status-item">
                    <span class="status-label">轨道区段:</span>
                    <span class="status-value" id="trackSectionValue">未选择</span>
                </div>
                <div class="status-item">
                    <span class="status-label">故障类型:</span>
                    <span class="status-value" id="faultTypeValue">未选择</span>
                </div>
                <div class="status-item">
                    <span class="status-label">仿真进度:</span>
                    <span class="status-value" id="resultStats">0 / 0</span>
                </div>
            </div>

            <!-- 轨道区段示意图和故障类型展示 -->
            <div class="railway-zone-container" style="margin: 30px 0; display: flex; gap: 20px; flex-wrap: wrap;">
                <!-- 轨道区段示意图 -->
                <div class="railway-zone" style="flex: 1; min-width: 300px; background-color: #2a2a2a; padding: 20px; border-radius: 8px; border: 1px solid #3498db;">
                    <h3 style="color: #3498db; margin-bottom: 15px;">轨道区段示意图</h3>
                    <div style="text-align: center; padding: 20px;">
                        <img id="railwayZoneImage" src="/static/images/railway_zone.png" alt="轨道区段示意图" style="max-width: 100%; height: auto; border-radius: 4px;">
                    </div>
                </div>
                
                <!-- 故障类型图片展示 -->
                <div class="fault-type-display" style="flex: 1; min-width: 300px; background-color: #2a2a2a; padding: 20px; border-radius: 8px; border: 1px solid #3498db;">
                    <h3 style="color: #3498db; margin-bottom: 15px;">故障类型展示</h3>
                    <div style="text-align: center; padding: 20px;">
                        <img id="faultTypeImage" src="/static/images/错误展示0.png" alt="故障类型展示" style="max-width: 100%; height: auto; border-radius: 4px;">
                        <p id="faultTypeDescription" style="margin-top: 15px; color: #ccc;">无故障</p>
                    </div>
                </div>
            </div>

            <div class="result-section">
                <h2>生成结果</h2>
                <div class="result-content" id="resultContent">
                    <p>请设置参数并点击"开始时序数据生成"按钮</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        let isLoggedIn = false;
        let currentUser = null;

        const faultTypeNames = {
            '0': '无故障',
            '1': '接收端调谐单元1断路',
            '2': '发送端调谐单元1断路',
            '3': '接收端空心线圈断路',
            '4': '接收端空芯线圈短路',
            '5': '接收端调谐单元2断路',
            '6': '补偿电容3断路',
            '7': '补偿电容3短路'
        };
        
        // 故障类型图片映射
        const faultTypeImages = {
            '0': '/static/images/错误展示0.png',
            '1': '/static/images/错误展示1.png',
            '2': '/static/images/错误展示2.png',
            '3': '/static/images/错误展示3.png',
            '4': '/static/images/错误展示4.png',
            '5': '/static/images/错误展示5.png',
            '6': '/static/images/错误展示6.png',
            '7': '/static/images/错误展示7.png'
        };

        const trackSectionParams = {
            '69G': { trackLength: 1200.0, cableLength: 10.0 },
            'X1LQG': { trackLength: 1100.0, cableLength: 8.0 },
            'IG1': { trackLength: 1300.0, cableLength: 12.0 },
            '57G': { trackLength: 1000.0, cableLength: 9.0 },
            '3DG': { trackLength: 1150.0, cableLength: 11.0 }
        };

        let currentSelection = { trackSection: '', faultType: '0' };

        let trackParameters = {
            trackName: "测试轨道",
            trackLength: 1200.0,
            resistance: 0.1,
            inductance: 0.001,
            capacitance: 1e-9,
            leakageResistance: 1.0,
            cableLength: 10.0,
            errorValue: 1.0,
            r1: 1,
            r2: 1
        };

        let simulationResults = [];
        let isSimulationRunning = false;
        let currentSimulationIndex = 0;
        let totalSimulationCount = 0;
        let abortControllers = [];
        let currentSessionId = null;

        function checkLoginStatus() {
            const savedUser = localStorage.getItem('user');
            if (savedUser) {
                currentUser = JSON.parse(savedUser);
                isLoggedIn = true;
                updateLoginUI();
            } else {
                isLoggedIn = false;
                currentUser = null;
                updateLoginUI();
                showLoginPrompt();
            }
        }

        function updateLoginUI() {
            const userInfoSection = document.getElementById('userInfoSection');
            const userName = document.getElementById('userName');
            if (isLoggedIn && currentUser) {
                userInfoSection.style.display = 'block';
                userName.textContent = currentUser.username;
                document.body.classList.add('logged-in');
            } else {
                userInfoSection.style.display = 'none';
                document.body.classList.remove('logged-in');
            }
        }

        function showLoginPrompt() {
            const container = document.querySelector('.container');
            container.innerHTML = `
                <div class="access-denied">
                    <h3>访问被拒绝</h3>
                    <p>请先登录以使用仿真系统功能</p>
                    <form class="login-form" onsubmit="event.preventDefault(); login()">
                        <div>
                            <label for="loginUsername">用户名:</label>
                            <input type="text" id="loginUsername" name="loginUsername" required>
                        </div>
                        <div>
                            <label for="loginPassword">密码:</label>
                            <input type="password" id="loginPassword" name="loginPassword" required>
                        </div>
                        <button type="submit" class="btn">登录</button>
                        <div class="login-error" id="loginError" style="display: none;">用户名或密码错误</div>
                    </form>
                    <div style="margin-top: 20px; text-align: center;">
                        <p style="color: #ccc; margin-bottom: 10px;">还没有账号？</p>
                        <a href="/register" class="btn" style="background-color: #27ae60; text-decoration: none;">立即注册</a>
                    </div>
                </div>
            `;
        }

        async function login() {
            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;
            try {
                const formData = new FormData();
                formData.append('username', username);
                formData.append('password', password);
                const response = await fetch('/api/login', {
                    method: 'POST',
                    body: formData,
                    headers: { 'Accept': 'application/json' },
                    credentials: 'include'
                });
                const result = await response.json();
                if (result.status === 'success') {
                    isLoggedIn = true;
                    currentUser = { username: username };
                    localStorage.setItem('user', JSON.stringify(currentUser));
                    window.location.reload();
                } else {
                    document.getElementById('loginError').style.display = 'block';
                }
            } catch (error) {
                console.error('登录失败:', error);
                document.getElementById('loginError').style.display = 'block';
            }
        }

        function logout() {
            isLoggedIn = false;
            currentUser = null;
            localStorage.removeItem('user');
            window.location.reload();
        }

        function openLeftMenu() {
            document.getElementById('leftMenu').classList.add('active');
            document.getElementById('overlay').classList.add('active');
        }

        function closeLeftMenu() {
            document.getElementById('leftMenu').classList.remove('active');
            document.getElementById('overlay').classList.remove('active');
        }

        function onTrackSectionChange() {
            const section = document.getElementById('trackSection').value;
            if (section && trackSectionParams[section]) {
                const params = trackSectionParams[section];
                document.getElementById('trackLength').value = params.trackLength;
                document.getElementById('cableLength').value = params.cableLength;
            }
        }

        function updateFaultTypeImage(faultType) {
            const faultTypeImage = document.getElementById('faultTypeImage');
            const faultTypeDescription = document.getElementById('faultTypeDescription');
            if (faultTypeImages[faultType]) {
                faultTypeImage.src = faultTypeImages[faultType];
            }
            if (faultTypeNames[faultType]) {
                faultTypeDescription.textContent = faultTypeNames[faultType];
            }
        }

        function saveSelection() {
            const section = document.getElementById('trackSection').value;
            const faultType = document.getElementById('faultType').value;
            if (!section) {
                showStatusMessage('请选择轨道区段！', 'error');
                return;
            }
            currentSelection.trackSection = section;
            currentSelection.faultType = faultType;
            document.getElementById('trackSectionValue').textContent = section;
            document.getElementById('faultTypeValue').textContent = faultTypeNames[faultType];
            // 更新故障类型图片
            updateFaultTypeImage(faultType);
            showStatusMessage('选择已保存！', 'success');
            closeLeftMenu();
        }

        function openParameterWindow() {
            document.getElementById('trackName').value = trackParameters.trackName;
            document.getElementById('trackLength').value = trackParameters.trackLength;
            document.getElementById('resistance').value = trackParameters.resistance;
            document.getElementById('inductance').value = trackParameters.inductance;
            document.getElementById('capacitance').value = trackParameters.capacitance;
            document.getElementById('leakageResistance').value = trackParameters.leakageResistance;
            document.getElementById('cableLength').value = trackParameters.cableLength;
            document.getElementById('errorValue').value = trackParameters.errorValue;
            document.getElementById('r1').value = trackParameters.r1;
            document.getElementById('r2').value = trackParameters.r2;
            document.getElementById('rightMenu').classList.add('active');
            document.getElementById('overlay').classList.add('active');
        }

        function closeParameterWindow() {
            document.getElementById('rightMenu').classList.remove('active');
            document.getElementById('overlay').classList.remove('active');
        }

        function saveParameters() {
            trackParameters = {
                trackName: document.getElementById('trackName').value,
                trackLength: parseFloat(document.getElementById('trackLength').value),
                resistance: parseFloat(document.getElementById('resistance').value),
                inductance: parseFloat(document.getElementById('inductance').value),
                capacitance: parseFloat(document.getElementById('capacitance').value),
                leakageResistance: parseFloat(document.getElementById('leakageResistance').value),
                cableLength: parseFloat(document.getElementById('cableLength').value),
                errorValue: parseFloat(document.getElementById('errorValue').value),
                r1: parseInt(document.getElementById('r1').value),
                r2: parseInt(document.getElementById('r2').value)
            };
            showStatusMessage('参数已保存！', 'success');
            closeParameterWindow();
        }

        function showStatusMessage(message, type) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `status-message ${type}`;
            messageDiv.textContent = message;
            const container = document.querySelector('.main-content');
            container.appendChild(messageDiv);
            messageDiv.style.display = 'block';
            setTimeout(() => {
                messageDiv.style.display = 'none';
                setTimeout(() => { container.removeChild(messageDiv); }, 300);
            }, 3000);
        }

        function getVoltageRange(level) {
            switch(level) {
                case 1:
                    return { min: 161, max: 170 };
                case 2:
                    return { min: 146, max: 154 };
                case 3:
                    return { min: 128, max: 135 };
                case 4:
                    return { min: 104.5, max: 110.5 };
                case 5:
                    return { min: 75, max: 79.5 };
                default:
                    return { min: 75, max: 170 };
            }
        }

        function generateVoltageValues() {
            const voltageLevel = parseInt(document.getElementById('voltageLevel').value);
            const useRandomVoltage = document.getElementById('useRandomVoltage').checked;
            const voltageCount = parseInt(document.getElementById('voltageCount').value);
            
            const range = getVoltageRange(voltageLevel);
            const voltageValues = [];
            
            if (useRandomVoltage) {
                // 生成随机电压值
                for (let i = 0; i < voltageCount; i++) {
                    const voltage = range.min + Math.random() * (range.max - range.min);
                    voltageValues.push(parseFloat(voltage.toFixed(1)));
                }
                // 排序
                voltageValues.sort((a, b) => a - b);
            } else {
                // 生成均匀分布的电压值
                const step = (range.max - range.min) / (voltageCount - 1);
                for (let i = 0; i < voltageCount; i++) {
                    const voltage = range.min + i * step;
                    voltageValues.push(parseFloat(voltage.toFixed(1)));
                }
            }
            
            return voltageValues;
        }

        function clearResults() {
            document.getElementById('resultContent').innerHTML = '<p>请设置参数并点击"开始时序数据生成"按钮</p>';
            document.getElementById('downloadButtons').style.display = 'none';
            simulationResults = [];
            document.getElementById('resultStats').textContent = '0 / 0';
            closeBottomWindow();
            closeChartWindow();
            document.getElementById('toggleBottomBtn').style.display = 'none';
            document.getElementById('toggleChartBtn').style.display = 'none';
        }

        function addResultItem(type, message) {
            const resultContent = document.getElementById('resultContent');
            const resultItem = document.createElement('div');
            resultItem.className = `result-item ${type}`;
            resultItem.textContent = message;
            resultContent.appendChild(resultItem);
            resultContent.scrollTop = resultContent.scrollHeight;
        }

        function stopTimeSeriesSimulation() {
            isSimulationRunning = false;
            abortControllers.forEach(controller => { controller.abort(); });
            abortControllers = [];
        }

        async function simulateSingle(params) {
            const formData = new FormData();
            formData.append('trail', `time_series_${Date.now()}_${Math.floor(Math.random() * 1000)}`);
            formData.append('error_type', params.error_type);
            formData.append('error_value', params.error_value);
            formData.append('error_position', params.section_id);
            formData.append('track_length', params.track_length);
            formData.append('resist_per_meter', params.resistance);
            formData.append('induct_per_meter', params.inductance);
            formData.append('capacit_per_meter', params.capacitance);
            formData.append('conduct_per_meter', 1.0 / (params.leakage_resistance * 1000));
            formData.append('frequency', params.frequency);
            formData.append('spt_cable_length', params.spt_cable_length);
            formData.append('r1', params.r1);
            formData.append('r2', params.r2);
            formData.append('input_V', params.voltage);

            try {
                if (!isSimulationRunning) throw new Error('模拟已停止');

                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 30000);

                try {
                    const response = await fetch(`/api/calculate/track-circuit?_=${Date.now()}`, {
                        method: 'POST',
                        body: formData,
                        signal: controller.signal,
                        headers: { 'Accept': 'application/json' }
                    });
                    clearTimeout(timeoutId);

                    if (!response.ok) throw new Error(`API调用失败: ${response.status}`);
                    const result = await response.json();
                    if (result.status !== 'success') throw new Error(result.message || '模拟失败');
                    return result;
                } catch (error) {
                    clearTimeout(timeoutId);
                    throw error;
                }
            } catch (error) {
                console.error('模拟失败:', error);
                throw error;
            }
        }

        function processSimulationResult(simulation) {
            currentSimulationIndex++;
            if (simulation.error) {
                const errorMessage = simulation.error.message || simulation.error || '未知错误';
                const faultType = simulation.params.error_type || 0;
                const faultTypeName = faultTypeNames[faultType] || '无故障';
                addResultItem('error', `模拟失败 (电压: ${(simulation.params.voltage || 0).toFixed(1)}V, 故障类型: ${faultTypeName}): ${errorMessage}`);
            } else {
                const result = simulation.result;
                const params = simulation.params;
                if (!result) {
                    const faultType = params.error_type || 0;
                    const faultTypeName = faultTypeNames[faultType] || '无故障';
                    addResultItem('error', `模拟失败 (电压: ${(params.voltage || 0).toFixed(1)}V, 故障类型: ${faultTypeName}): 无效的模拟结果`);
                    return;
                }
                const voltageResults = result.voltage_results || {
                    send_end_track_voltage: 0,
                    receive_end_track_voltage: 0,
                    main_track_input_voltage: 0,
                    main_track_output_voltage_1: 0
                };
                const resultData = {
                    voltage: params.voltage,
                    section_id: params.section_id,
                    error_type: params.error_type,
                    track_length: params.track_length,
                    send_end_track_voltage: voltageResults.send_end_track_voltage || 0,
                    receive_end_track_voltage: voltageResults.receive_end_track_voltage || 0,
                    main_track_input_voltage: voltageResults.main_track_input_voltage || 0,
                    main_track_output_voltage_1: voltageResults.main_track_output_voltage_1 || 0,
                    input_impedance: result.input_impedance || 0,
                    input_current: result.input_current || 0,
                    timestamp: new Date().toISOString()
                };
                simulationResults.push(resultData);

                const faultType = params.error_type || 0;
                const faultTypeName = faultTypeNames[faultType] || '无故障';
                addResultItem('success', `模拟成功 (电压: ${(params.voltage || 0).toFixed(1)}V, 故障类型: ${faultTypeName}) - 送端轨面电压: ${(voltageResults.send_end_track_voltage || 0).toFixed(2)}V, 受端轨面电压: ${(voltageResults.receive_end_track_voltage || 0).toFixed(2)}V, 主轨入电压: ${(voltageResults.main_track_input_voltage || 0).toFixed(2)}V, 轨出1电压: ${(voltageResults.main_track_output_voltage_1 || 0).toFixed(2)}V`);
                showToggleButton();
                showChartToggleButton();
                updateSimulationResult();
            }
            const progress = (currentSimulationIndex / totalSimulationCount) * 100;
            document.getElementById('progressFill').style.width = `${progress}%`;
            document.getElementById('resultStats').textContent = `${currentSimulationIndex} / ${totalSimulationCount}`;
        }

        async function finishTimeSeriesSimulation() {
            isSimulationRunning = false;
            document.getElementById('startSimulationBtn').disabled = false;
            document.getElementById('stopSimulationBtn').disabled = true;
            document.getElementById('progressText').textContent = '时序数据生成完成！';

            // 一次性将所有数据保存到CSV
            // 将数据保存到CSV（用于下载功能）
            if (simulationResults.length > 0) {
                try {
                    // 先清空旧的CSV文件
                    await fetch('/api/time-series/clear-csv', { method: 'POST' });
                    for (const result of simulationResults) {
                        await fetch('/api/time-series/save-to-csv', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(result)
                        });
                        await delay(100);
                    }
                    console.log(`已保存 ${simulationResults.length} 条数据到CSV`);
                } catch (error) {
                    console.error('保存到CSV失败:', error);
                }
            }

            if (simulationResults.length > 0) {
                document.getElementById('downloadButtons').style.display = 'flex';
                const noFaultCount = simulationResults.filter(result => result.error_type === 0).length;
                const faultCount = simulationResults.filter(result => result.error_type !== 0).length;
                addResultItem('success', `时序数据生成完成！共生成 ${simulationResults.length} 条有效数据，其中无故障数据 ${noFaultCount} 条，故障数据 ${faultCount} 条。`);
                showToggleButton();
                showChartToggleButton();
                updateSimulationResult();
            } else {
                addResultItem('error', '时序数据生成完成，但未生成任何有效数据。');
            }
        }

        // 延迟函数
        function delay(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        async function startTimeSeriesSimulation() {
            if (!currentSelection.trackSection) {
                showStatusMessage('请先选择轨道区段和故障类型！', 'error');
                return;
            }
            const sectionId = currentSelection.trackSection;
            const selectedErrorType = parseInt(currentSelection.faultType);
            const { trackLength, resistance, inductance, capacitance, leakageResistance, cableLength, errorValue, r1, r2 } = trackParameters;

            const voltageValues = generateVoltageValues();
            const halfLength = Math.ceil(voltageValues.length / 2);
            const noFaultVoltages = voltageValues.slice(0, halfLength);
            const faultVoltages = voltageValues.slice(halfLength);
            totalSimulationCount = voltageValues.length;
            if (totalSimulationCount <= 0) {
                alert('无效的电压设置');
                return;
            }

            simulationResults = [];
            isSimulationRunning = true;
            currentSimulationIndex = 0;

            // 清除旧的CSV文件
            try {
                await fetch('/api/time-series/clear-csv', { method: 'POST' });
            } catch (error) {
                console.error('清除CSV文件失败:', error);
            }

            document.getElementById('startSimulationBtn').disabled = true;
            document.getElementById('stopSimulationBtn').disabled = false;
            document.getElementById('downloadButtons').style.display = 'none';
            document.getElementById('resultContent').innerHTML = '<p class="result-item info">正在准备时序数据生成...</p>';
            document.getElementById('progressFill').style.width = '0%';
            document.getElementById('progressText').textContent = '准备开始...';

            try {
                let frequency;
                if (sectionId === "69G" || sectionId === "X1LQG" || sectionId === "IG1") {
                    frequency = 1700;
                } else if (sectionId === "57G" || sectionId === "3DG") {
                    frequency = 2300;
                } else {
                    frequency = 1700;
                }

                // 先生成无故障数据
                document.getElementById('progressText').textContent = '正在生成无故障数据...';
                for (let i = 0; i < noFaultVoltages.length; i++) {
                    if (!isSimulationRunning) break;
                    const voltage = noFaultVoltages[i];
                    const params = {
                        section_id: sectionId,
                        frequency: frequency,
                        error_type: 0, // 无故障
                        error_value: errorValue,
                        track_length: trackLength,
                        resistance: resistance,
                        inductance: inductance,
                        capacitance: capacitance,
                        leakage_resistance: leakageResistance,
                        spt_cable_length: cableLength,
                        r1: r1,
                        r2: r2,
                        voltage: voltage
                    };
                    try {
                        const result = await simulateSingle(params);
                        processSimulationResult({ params, result });
                    } catch (error) {
                        console.error('模拟失败:', error);
                        processSimulationResult({ params, error: error });
                    }
                    // 在请求之间添加延迟，让连接有机会关闭
                    await delay(1000);
                }

                // 再生成选定故障类型的数据
                document.getElementById('progressText').textContent = '正在生成故障数据...';
                for (let i = 0; i < faultVoltages.length; i++) {
                    if (!isSimulationRunning) break;
                    const voltage = faultVoltages[i];
                    const params = {
                        section_id: sectionId,
                        frequency: frequency,
                        error_type: selectedErrorType,
                        error_value: errorValue,
                        track_length: trackLength,
                        resistance: resistance,
                        inductance: inductance,
                        capacitance: capacitance,
                        leakage_resistance: leakageResistance,
                        spt_cable_length: cableLength,
                        r1: r1,
                        r2: r2,
                        voltage: voltage
                    };
                    try {
                        const result = await simulateSingle(params);
                        processSimulationResult({ params, result });
                    } catch (error) {
                        console.error('模拟失败:', error);
                        processSimulationResult({ params, error: error });
                    }
                    // 在请求之间添加延迟，让连接有机会关闭
                    await delay(1000);
                }
            } catch (error) {
                console.error('时序数据生成失败:', error);
                addResultItem('error', `时序数据生成失败: ${error.message}`);
            } finally {
                finishTimeSeriesSimulation();
            }
        }

        function downloadCSV() {
            if (simulationResults.length === 0) {
                showStatusMessage('没有数据可下载！', 'error');
                return;
            }
            let csvContent = '电压 (V),送端轨面电压 (V),受端轨面电压 (V),主轨入电压 (V),轨出1电压 (V),输入阻抗 (Ω),输入电流 (A),时间戳\n';
            simulationResults.forEach(item => {
                csvContent += `${item.voltage.toFixed(1)},${item.send_end_track_voltage.toFixed(2)},${item.receive_end_track_voltage.toFixed(2)},${item.main_track_input_voltage.toFixed(2)},${item.main_track_output_voltage_1.toFixed(2)},${item.input_impedance.toFixed(2)},${item.input_current.toFixed(4)},${item.timestamp}\n`;
            });
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.setAttribute('href', url);
            link.setAttribute('download', `time_series_data_${new Date().toISOString().slice(0, 19).replace(/[-:]/g, '')}.csv`);
            link.style.visibility = 'hidden';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            showStatusMessage('CSV文件下载成功！', 'success');
        }

        function downloadJSON() {
            if (simulationResults.length === 0) {
                showStatusMessage('没有数据可下载！', 'error');
                return;
            }
            const jsonContent = JSON.stringify(simulationResults, null, 2);
            const blob = new Blob([jsonContent], { type: 'application/json;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.setAttribute('href', url);
            link.setAttribute('download', `time_series_data_${new Date().toISOString().slice(0, 19).replace(/[-:]/g, '')}.json`);
            link.style.visibility = 'hidden';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            showStatusMessage('JSON文件下载成功！', 'success');
        }

        function closeBottomWindow() {
            document.getElementById('bottomFloatingWindow').classList.remove('active');
        }

        function toggleBottomWindow() {
            const bottomWindow = document.getElementById('bottomFloatingWindow');
            bottomWindow.classList.toggle('active');
            updateSimulationResult();
        }

        function updateSimulationResult() {
            const grid = document.getElementById('simulationResultGrid');
            grid.innerHTML = '';
            if (simulationResults.length === 0) {
                grid.innerHTML = '<p style="color: #999; text-align: center; padding: 40px;">暂无生成结果</p>';
                document.getElementById('downloadButtons').style.display = 'none';
                return;
            }
            document.getElementById('downloadButtons').style.display = 'flex';
            simulationResults.forEach((result, index) => {
                const card = document.createElement('div');
                card.className = 'result-card';
                const faultType = result.error_type || 0;
                const faultTypeName = faultTypeNames[faultType] || '无故障';
                card.innerHTML = `
                    <h4>电压: ${result.voltage.toFixed(1)}V (${index + 1}/${simulationResults.length})</h4>
                    <div class="result-detail">故障类型: ${faultTypeName}</div>
                    <div class="result-detail">送端轨面电压: ${(result.send_end_track_voltage || 0).toFixed(2)}V</div>
                    <div class="result-detail">受端轨面电压: ${(result.receive_end_track_voltage || 0).toFixed(2)}V</div>
                    <div class="result-detail">主轨入电压: ${(result.main_track_input_voltage || 0).toFixed(2)}V</div>
                    <div class="result-detail">轨出1电压: ${(result.main_track_output_voltage_1 || 0).toFixed(2)}V</div>
                    <div class="result-detail">输入阻抗: ${(result.input_impedance || 0).toFixed(2)}Ω</div>
                    <div class="result-detail">输入电流: ${(result.input_current || 0).toFixed(4)}A</div>
                `;
                grid.appendChild(card);
            });
        }

        function showToggleButton() {
            const btn = document.getElementById('toggleBottomBtn');
            btn.style.display = 'block';
        }

        function showChartToggleButton() {
            const btn = document.getElementById('toggleChartBtn');
            btn.style.display = 'block';
        }

        function closeChartWindow() {
            document.getElementById('chartFloatingWindow').classList.remove('active');
        }

        function toggleChartWindow() {
            const chartWindow = document.getElementById('chartFloatingWindow');
            chartWindow.classList.toggle('active');
            if (chartWindow.classList.contains('active')) {
                updateChart();
            }
        }

        let dataChart = null;
        let currentChartType = 'voltage';

        const chartLabels = {
            'voltage': '输入电压 (V)',
            'send_end_track_voltage': '送端轨面电压 (V)',
            'receive_end_track_voltage': '受端轨面电压 (V)',
            'main_track_input_voltage': '主轨入电压 (V)',
            'main_track_output_voltage_1': '轨出1电压 (V)',
            'input_impedance': '输入阻抗 (Ω)',
            'input_current': '输入电流 (A)'
        };

        const chartColors = {
            'send_end_track_voltage': 'rgba(52, 152, 219, 1)',
            'receive_end_track_voltage': 'rgba(46, 204, 113, 1)',
            'main_track_input_voltage': 'rgba(241, 196, 15, 1)',
            'main_track_output_voltage_1': 'rgba(155, 89, 182, 1)',
            'input_impedance': 'rgba(230, 126, 34, 1)',
            'input_current': 'rgba(231, 76, 60, 1)'
        };

        const noFaultColor = {
            border: 'rgba(39, 174, 96, 1)',
            background: 'rgba(39, 174, 96, 0.2)',
            point: 'rgba(39, 174, 96, 1)'
        };

        const faultColor = {
            border: 'rgba(231, 76, 60, 1)',
            background: 'rgba(231, 76, 60, 0.2)',
            point: 'rgba(231, 76, 60, 1)'
        };

        function switchChart(chartType, event) {
            currentChartType = chartType;
            
            // 更新按钮状态
            document.querySelectorAll('.chart-control-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            if (event && event.target) {
                event.target.classList.add('active');
            }
            
            updateChart();
        }

        function updateChart() {
            if (simulationResults.length === 0) {
                return;
            }

            const ctx = document.getElementById('dataChart').getContext('2d');

            // 将数据分为无故障和故障两组
            const noFaultResults = simulationResults.filter(result => result.error_type === 0);
            const faultResults = simulationResults.filter(result => result.error_type !== 0);

            // 生成序号标签
            const maxLength = Math.max(noFaultResults.length, faultResults.length);
            const labels = Array.from({ length: maxLength }, (_, i) => i + 1);

            // 销毁旧图表
            if (dataChart) {
                dataChart.destroy();
            }

            let datasets = [];

            if (currentChartType === 'voltage') {
                // 输入电压图表 - 显示无故障和故障的输入电压
                datasets.push({
                    label: '无故障 - 输入电压 (V)',
                    data: labels.map(index => {
                        const result = noFaultResults[index - 1];
                        return result ? result.voltage : null;
                    }),
                    borderColor: noFaultColor.border,
                    backgroundColor: noFaultColor.background,
                    borderWidth: 2,
                    tension: 0.3,
                    fill: true,
                    pointBackgroundColor: noFaultColor.point,
                    pointBorderColor: '#fff',
                    pointBorderWidth: 2,
                    pointRadius: 5,
                    pointHoverRadius: 7,
                    spanGaps: true
                });
                
                datasets.push({
                    label: '故障 - 输入电压 (V)',
                    data: labels.map(index => {
                        const result = faultResults[index - 1];
                        return result ? result.voltage : null;
                    }),
                    borderColor: faultColor.border,
                    backgroundColor: faultColor.background,
                    borderWidth: 2,
                    tension: 0.3,
                    fill: true,
                    pointBackgroundColor: faultColor.point,
                    pointBorderColor: '#fff',
                    pointBorderWidth: 2,
                    pointRadius: 5,
                    pointHoverRadius: 7,
                    spanGaps: true
                });
            } else {
                // 其他数据类型图表
                datasets.push({
                    label: '无故障 - ' + chartLabels[currentChartType],
                    data: labels.map(index => {
                        const result = noFaultResults[index - 1];
                        return result ? (result[currentChartType] || 0) : null;
                    }),
                    borderColor: noFaultColor.border,
                    backgroundColor: noFaultColor.background,
                    borderWidth: 2,
                    tension: 0.3,
                    fill: true,
                    pointBackgroundColor: noFaultColor.point,
                    pointBorderColor: '#fff',
                    pointBorderWidth: 2,
                    pointRadius: 5,
                    pointHoverRadius: 7,
                    spanGaps: true
                });
                
                datasets.push({
                    label: '故障 - ' + chartLabels[currentChartType],
                    data: labels.map(index => {
                        const result = faultResults[index - 1];
                        return result ? (result[currentChartType] || 0) : null;
                    }),
                    borderColor: faultColor.border,
                    backgroundColor: faultColor.background,
                    borderWidth: 2,
                    tension: 0.3,
                    fill: true,
                    pointBackgroundColor: faultColor.point,
                    pointBorderColor: '#fff',
                    pointBorderWidth: 2,
                    pointRadius: 5,
                    pointHoverRadius: 7,
                    spanGaps: true
                });
            }

            // 创建新图表
            dataChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: datasets
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        title: {
                            display: true,
                            text: chartLabels[currentChartType],
                            color: '#3498db',
                            font: {
                                size: 16
                            }
                        },
                        legend: {
                            display: true,
                            position: 'top',
                            labels: {
                                color: '#fff'
                            }
                        }
                    },
                    scales: {
                        x: {
                            title: {
                                display: true,
                                text: '序号',
                                color: '#999'
                            },
                            ticks: {
                                color: '#ccc'
                            },
                            grid: {
                                color: 'rgba(255, 255, 255, 0.1)'
                            }
                        },
                        y: {
                            title: {
                                display: true,
                                text: chartLabels[currentChartType],
                                color: '#999'
                            },
                            ticks: {
                                color: '#ccc'
                            },
                            grid: {
                                color: 'rgba(255, 255, 255, 0.1)'
                            }
                        }
                    }
                }
            });
        }

        document.getElementById('overlay').addEventListener('click', function() {
            closeLeftMenu();
            closeParameterWindow();
        });

        window.addEventListener('DOMContentLoaded', function() {
            checkLoginStatus();
        });
    </script>

    <div class="bottom-floating-window" id="bottomFloatingWindow">
        <div class="bottom-window-header">
            <h3>生成结果</h3>
            <button class="close-bottom-btn" onclick="closeBottomWindow()">&times;</button>
        </div>
        <div class="bottom-window-content">
            <div class="simulation-result-grid" id="simulationResultGrid"></div>
            <div class="download-buttons" id="downloadButtons" style="display: none; margin-top: 20px; padding-top: 20px; border-top: 1px solid #3498db;">
                <button class="btn" onclick="downloadCSV()">下载 CSV 文件</button>
                <button class="btn" onclick="downloadJSON()">下载 JSON 文件</button>
            </div>
        </div>
    </div>

    <button class="toggle-bottom-btn" id="toggleBottomBtn" onclick="toggleBottomWindow()">查看生成结果</button>
    <button class="chart-toggle-btn" id="toggleChartBtn" onclick="toggleChartWindow()">查看数据图表</button>

    <div class="chart-floating-window" id="chartFloatingWindow">
        <div class="chart-window-header">
            <h3>数据图表</h3>
            <button class="close-chart-btn" onclick="closeChartWindow()">&times;</button>
        </div>
        <div class="chart-window-content">
            <div class="chart-controls">
                <button class="chart-control-btn active" onclick="switchChart('voltage', event)">输入电压</button>
                <button class="chart-control-btn" onclick="switchChart('send_end_track_voltage', event)">送端轨面电压</button>
                <button class="chart-control-btn" onclick="switchChart('receive_end_track_voltage', event)">受端轨面电压</button>
                <button class="chart-control-btn" onclick="switchChart('main_track_input_voltage', event)">主轨入电压</button>
                <button class="chart-control-btn" onclick="switchChart('main_track_output_voltage_1', event)">轨出1电压</button>
                <button class="chart-control-btn" onclick="switchChart('input_impedance', event)">输入阻抗</button>
                <button class="chart-control-btn" onclick="switchChart('input_current', event)">输入电流</button>
            </div>
            <div class="chart-container">
                <canvas id="dataChart"></canvas>
            </div>
        </div>
    </div>
</body>
</html>
