<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XY坐标图绘制</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f7fa;
            color: #333;
            line-height: 1.6;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            background-color: white;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            border-radius: 8px;
            margin-top: 20px;
            margin-bottom: 20px;
        }
        h1 {
            color: #2c3e50;
            margin-bottom: 20px;
            text-align: center;
        }
        h2 {
            color: #3498db;
            margin: 20px 0 15px;
            border-bottom: 1px solid #eee;
            padding-bottom: 5px;
        }
        .btn {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 4px;
            cursor: pointer;
            margin: 10px 5px 10px 0;
            transition: background-color 0.3s ease;
        }
        .btn:hover {
            background-color: #2980b9;
        }
        .btn.secondary {
            background-color: #95a5a6;
        }
        .btn.secondary:hover {
            background-color: #7f8c8d;
        }
        .form-row {
            display: flex;
            gap: 15px;
            margin: 15px 0;
            flex-wrap: wrap;
        }
        .form-col {
            flex: 1;
            min-width: 200px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input[type="file"] {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
            margin: 5px 0;
        }
        select {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
            margin: 5px 0;
        }
        select[multiple] {
            height: 120px;
            overflow-y: auto;
        }
        select[multiple]:focus {
            outline: none;
            border-color: #3498db;
            box-shadow: 0 0 0 2px rgba(52, 152, 219, 0.2);
        }
        .wave-display {
            margin: 20px 0;
            padding: 20px;
            background-color: #f9f9f9;
            border: 1px solid #ddd;
            border-radius: 4px;
            text-align: center;
        }
        canvas {
            border: 1px solid #ddd;
            background-color: white;
            border-radius: 4px;
            margin: 10px 0;
        }
        .data-display {
            background-color: #ecf0f1;
            padding: 20px;
            border-radius: 4px;
            margin: 20px 0;
            min-height: 100px;
            border: 1px solid #ddd;
        }
        .card {
            background-color: #f9f9f9;
            border: 1px solid #ddd;
            border-radius: 4px;
            padding: 15px;
            margin: 10px 0;
        }
        .success { color: #27ae60; }
        .error { color: #e74c3c; }
        .loading { color: #7f8c8d; font-style: italic; }
        .control-buttons {
            margin: 20px 0;
            text-align: center;
        }
        .file-upload {
            margin: 20px 0;
            padding: 20px;
            border: 2px dashed #ddd;
            border-radius: 4px;
            text-align: center;
        }
        .file-upload:hover {
            border-color: #3498db;
        }
        .sheet-selector {
            margin: 10px 0;
        }
        .column-selectors {
            display: flex;
            gap: 15px;
            margin: 15px 0;
            flex-wrap: wrap;
        }
        .column-selector {
            flex: 1;
            min-width: 200px;
        }
    </style>
    <!-- 引入SheetJS库 -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
</head>
<body>
    <div class="container">
        <h1>XY坐标图绘制</h1>
        <div style="margin-bottom: 20px; text-align: center;">
            <a href="/" class="btn">返回首页</a>
        </div>
        
        <h2>文件导入</h2>
        <div class="file-upload">
            <h3>上传数据文件</h3>
            <p>请上传包含X和Y坐标数据的文件，数据应按列保存</p>
            <input type="file" id="fileInput" accept=".xlsx,.xls,.csv">
            <div class="sheet-selector" id="sheetSelector" style="display: none;">
                <label for="sheetName">选择工作表:</label>
                <select id="sheetName"></select>
            </div>
        </div>
        
        <h2>参数设置</h2>
        <form id="paramsForm" onsubmit="event.preventDefault(); plotXY();">
            <div class="column-selectors">
                <div class="column-selector">
                    <label for="xColumn">选择X轴数据列:</label>
                    <select id="xColumn"></select>
                </div>
                <div class="column-selector">
                    <label for="yColumns">选择Y轴数据列 (可多选):</label>
                    <select id="yColumns" multiple size="5"></select>
                    <small style="display: block; margin-top: 5px; color: #666;">提示：按住Ctrl键可选择多个选项</small>
                </div>
                <div class="column-selector">
                    <label for="typeColumn">选择数据类型列:</label>
                    <select id="typeColumn">
                        <option value="-1">不使用数据类型</option>
                    </select>
                </div>
            </div>
            
            <div class="form-row">
                <div class="form-col">
                    <label for="startRow">数据起始行:</label>
                    <select id="startRow">
                        <option value="1">包含表头</option>
                        <option value="2" selected>不包含表头</option>
                    </select>
                </div>
                <div class="form-col">
                    <label for="samples">采样点数:</label>
                    <select id="samples">
                        <option value="100">100</option>
                        <option value="200">200</option>
                        <option value="500" selected>500</option>
                        <option value="1000">1000</option>
                        <option value="2000">2000</option>
                    </select>
                </div>
                <div class="form-col">
                    <label for="displayMode">显示模式:</label>
                    <select id="displayMode">
                        <option value="single">同一图表</option>
                        <option value="multiple">不同图表</option>
                    </select>
                </div>
            </div>
            
            <div class="control-buttons">
                <button type="submit" class="btn">绘制XY图</button>
                <button type="button" class="btn secondary" onclick="clearForm()">重置</button>
            </div>
        </form>
        
        <h2>XY坐标图显示</h2>
        <div class="wave-display">
            <canvas id="xyCanvas" width="1000" height="400"></canvas>
            <div id="xyInfo" class="data-display">
                <p class="loading">请上传文件并设置参数后绘制XY图</p>
            </div>
        </div>
    </div>
    <script>
        // 全局变量
        let workbook = null;
        let worksheet = null;
        let xData = [];
        let yData = [];
        
        // 页面加载时初始化
        document.addEventListener('DOMContentLoaded', function() {
            // 监听文件上传
            document.getElementById('fileInput').addEventListener('change', handleFileUpload);
            // 监听工作表选择
            document.getElementById('sheetName').addEventListener('change', handleSheetChange);
        });

        // 处理文件上传
        function handleFileUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    // 对于CSV文件，尝试使用文本方式读取以处理编码问题
                    if (file.name.endsWith('.csv')) {
                        // 尝试使用UTF-8编码读取
                        const text = e.target.result;
                        workbook = XLSX.read(text, { type: 'string' });
                    } else {
                        // 对于Excel文件，使用二进制方式读取
                        const data = new Uint8Array(e.target.result);
                        workbook = XLSX.read(data, { type: 'array' });
                    }
                    
                    // 显示工作表选择器
                    const sheetSelector = document.getElementById('sheetSelector');
                    sheetSelector.style.display = 'block';
                    
                    // 填充工作表选项
                    const sheetNameSelect = document.getElementById('sheetName');
                    sheetNameSelect.innerHTML = '';
                    workbook.SheetNames.forEach(sheetName => {
                        const option = document.createElement('option');
                        option.value = sheetName;
                        option.textContent = sheetName;
                        sheetNameSelect.appendChild(option);
                    });
                    
                    // 确保至少有一个工作表选项
                    if (sheetNameSelect.options.length > 0) {
                        // 自动选择第一个工作表
                        sheetNameSelect.selectedIndex = 0;
                        // 手动触发工作表选择事件
                        const event = new Event('change');
                        sheetNameSelect.dispatchEvent(event);
                    } else {
                        throw new Error('文件中没有找到工作表');
                    }
                    
                    document.getElementById('xyInfo').innerHTML = '<p class="success">✅ 文件上传成功！</p>';
                } catch (error) {
                    document.getElementById('xyInfo').innerHTML = '<p class="error">❌ 文件读取失败: ' + error.message + '</p>';
                }
            };
            
            // 根据文件类型选择读取方式
            if (file.name.endsWith('.csv')) {
                reader.readAsText(file, 'UTF-8');
            } else {
                reader.readAsArrayBuffer(file);
            }
        }

        // 处理工作表选择
        function handleSheetChange(event) {
            const sheetName = event.target.value;
            worksheet = workbook.Sheets[sheetName];
            
            // 转换工作表数据
            const jsonData = XLSX.utils.sheet_to_json(worksheet, { header: 1 });
            
            // 填充数据列选择器
            const xColumnSelect = document.getElementById('xColumn');
            const yColumnsSelect = document.getElementById('yColumns');
            const typeColumnSelect = document.getElementById('typeColumn');
            xColumnSelect.innerHTML = '';
            yColumnsSelect.innerHTML = '';
            typeColumnSelect.innerHTML = '<option value="-1">不使用数据类型</option>';
            
            if (jsonData.length > 0) {
                // 获取列数
                const columnCount = jsonData[0].length;
                for (let i = 0; i < columnCount; i++) {
                    // 尝试使用表头作为选项文本，如果没有则使用列号
                    const headerText = jsonData[0][i] ? String(jsonData[0][i]) : `列 ${i + 1}`;
                    // 清理可能的乱码字符
                    const cleanedText = headerText.replace(/[^\x00-\x7F\u4e00-\u9fa5]/g, '');
                    const displayText = cleanedText || `列 ${i + 1}`;
                    
                    // 添加到X轴选择器
                    const xOption = document.createElement('option');
                    xOption.value = i;
                    xOption.textContent = displayText;
                    xColumnSelect.appendChild(xOption);
                    
                    // 添加到Y轴选择器（多选）
                    const yOption = document.createElement('option');
                    yOption.value = i;
                    yOption.textContent = displayText;
                    yColumnsSelect.appendChild(yOption);
                    
                    // 添加到数据类型选择器
                    const typeOption = document.createElement('option');
                    typeOption.value = i;
                    typeOption.textContent = displayText;
                    typeColumnSelect.appendChild(typeOption);
                }
            }
            
            document.getElementById('xyInfo').innerHTML = '<p class="success">✅ 工作表选择成功！</p>';
        }

        // 绘制XY图
        function plotXY() {
            const xyInfo = document.getElementById('xyInfo');
            const waveDisplay = document.querySelector('.wave-display');
            
            try {
                if (!workbook || !worksheet) {
                    throw new Error('请先上传文件并选择工作表');
                }
                
                // 获取输入参数
                const xColumn = parseInt(document.getElementById('xColumn').value);
                const yColumnsSelect = document.getElementById('yColumns');
                const selectedYColumns = Array.from(yColumnsSelect.selectedOptions).map(option => parseInt(option.value));
                const typeColumn = parseInt(document.getElementById('typeColumn').value);
                const startRow = parseInt(document.getElementById('startRow').value) - 1; // 转换为0索引
                const samples = parseInt(document.getElementById('samples').value);
                const displayMode = document.getElementById('displayMode').value;
                
                if (selectedYColumns.length === 0) {
                    throw new Error('请至少选择一个Y轴数据列');
                }
                
                // 转换工作表数据
                const jsonData = XLSX.utils.sheet_to_json(worksheet, { header: 1 });
                
                if (startRow >= jsonData.length) {
                    throw new Error('数据起始行超出范围');
                }
                
                // 提取X轴数据
                const xData = [];
                for (let i = startRow; i < jsonData.length; i++) {
                    const xValue = parseFloat(jsonData[i][xColumn]);
                    if (!isNaN(xValue)) {
                        xData.push(xValue);
                    }
                }
                
                if (xData.length === 0) {
                    throw new Error('X轴数据列中没有有效数据');
                }
                
                // 提取每个Y轴数据列的数据
                const yDataArray = [];
                const yColumnNames = [];
                for (const yColumn of selectedYColumns) {
                    const yData = [];
                    for (let i = startRow; i < jsonData.length; i++) {
                        const yValue = parseFloat(jsonData[i][yColumn]);
                        if (!isNaN(yValue)) {
                            yData.push(yValue);
                        }
                    }
                    yDataArray.push(yData);
                    
                    // 获取Y轴列名称
                    const headerText = jsonData[0][yColumn] ? String(jsonData[0][yColumn]) : `列 ${yColumn + 1}`;
                    const cleanedText = headerText.replace(/[^\x00-\x7F\u4e00-\u9fa5]/g, '');
                    yColumnNames.push(cleanedText || `列 ${yColumn + 1}`);
                }
                
                // 检查所有Y轴数据列是否有有效数据
                for (let i = 0; i < yDataArray.length; i++) {
                    if (yDataArray[i].length === 0) {
                        throw new Error(`Y轴数据列 "${yColumnNames[i]}" 中没有有效数据`);
                    }
                }
                
                // 为不同Y轴数据列分配颜色
                const colorPalette = [
                    '#e74c3c', // 红色
                    '#3498db', // 蓝色
                    '#27ae60', // 绿色
                    '#f39c12', // 橙色
                    '#9b59b6', // 紫色
                    '#1abc9c', // 青色
                    '#e67e22', // 深橙色
                    '#34495e', // 深灰色
                    '#16a085', // 深青色
                    '#8e44ad'  // 深紫色
                ];
                
                // 计算要显示的数据点
                const displayPoints = Math.min(samples, xData.length);
                const step = Math.floor(xData.length / displayPoints);
                
                // 清除波形显示区域
                waveDisplay.innerHTML = '';
                
                if (displayMode === 'single') {
                    // 同一图表模式
                    const canvas = document.createElement('canvas');
                    canvas.id = 'xyCanvas';
                    canvas.width = 1000;
                    canvas.height = 400;
                    waveDisplay.appendChild(canvas);
                    
                    const ctx = canvas.getContext('2d');
                    
                    // 绘制坐标轴
                    const centerY = canvas.height / 2;
                    const centerX = 50;
                    const width = canvas.width - 100;
                    const height = canvas.height - 40;
                    
                    // 确定X轴数据范围
                    const xMax = Math.max(...xData);
                    const xMin = Math.min(...xData);
                    const xRange = xMax - xMin;
                    
                    // 确定Y轴数据范围（所有Y轴数据的最大值和最小值）
                    let yMax = -Infinity;
                    let yMin = Infinity;
                    for (const yData of yDataArray) {
                        const currentMax = Math.max(...yData);
                        const currentMin = Math.min(...yData);
                        if (currentMax > yMax) yMax = currentMax;
                        if (currentMin < yMin) yMin = currentMin;
                    }
                    const yRange = yMax - yMin;
                    
                    // 添加一些边距，确保所有数据点都能显示
                    const xPadding = xRange * 0.1;
                    const yPadding = yRange * 0.1;
                    const adjustedXMin = xMin - xPadding;
                    const adjustedXMax = xMax + xPadding;
                    const adjustedYMin = yMin - yPadding;
                    const adjustedYMax = yMax + yPadding;
                    const adjustedXRange = adjustedXMax - adjustedXMin;
                    const adjustedYRange = adjustedYMax - adjustedYMin;
                    
                    // 绘制坐标轴
                    ctx.beginPath();
                    ctx.moveTo(centerX, 20);
                    ctx.lineTo(centerX, canvas.height - 20);
                    ctx.lineTo(canvas.width - 20, canvas.height - 20);
                    ctx.strokeStyle = '#333';
                    ctx.lineWidth = 1;
                    ctx.stroke();
                    
                    // 绘制网格
                    ctx.strokeStyle = '#eee';
                    ctx.lineWidth = 0.5;
                    
                    // 水平网格线和刻度
                    const ySteps = 10;
                    for (let i = 0; i <= ySteps; i++) {
                        const y = 20 + (i * height / ySteps);
                        ctx.beginPath();
                        ctx.moveTo(centerX, y);
                        ctx.lineTo(canvas.width - 20, y);
                        ctx.stroke();
                        
                        // 绘制Y轴刻度
                        const value = adjustedYMax - (i * adjustedYRange / ySteps);
                        ctx.fillStyle = '#333';
                        ctx.font = '10px Arial';
                        ctx.textAlign = 'right';
                        ctx.fillText(value.toFixed(2), centerX - 5, y + 3);
                    }
                    
                    // 垂直网格线和刻度
                    const xSteps = 10;
                    for (let i = 0; i <= xSteps; i++) {
                        const x = centerX + (i * width / xSteps);
                        ctx.beginPath();
                        ctx.moveTo(x, 20);
                        ctx.lineTo(x, canvas.height - 20);
                        ctx.stroke();
                        
                        // 绘制X轴刻度
                        const value = adjustedXMin + (i * adjustedXRange / xSteps);
                        ctx.fillStyle = '#333';
                        ctx.font = '10px Arial';
                        ctx.textAlign = 'center';
                        ctx.fillText(value.toFixed(2), x, canvas.height - 5);
                    }
                    
                    // 绘制每个Y轴数据列的曲线
                    for (let i = 0; i < yDataArray.length; i++) {
                        const yData = yDataArray[i];
                        const color = colorPalette[i % colorPalette.length];
                        
                        // 绘制连接线
                        ctx.beginPath();
                        for (let j = 0; j < displayPoints; j++) {
                            const dataIndex = j * step;
                            const x = centerX + ((xData[dataIndex] - adjustedXMin) / adjustedXRange) * width;
                            const y = 20 + height - ((yData[dataIndex] - adjustedYMin) / adjustedYRange) * height;
                            
                            if (j === 0) {
                                ctx.moveTo(x, y);
                            } else {
                                ctx.lineTo(x, y);
                            }
                        }
                        ctx.strokeStyle = color;
                        ctx.lineWidth = 2;
                        ctx.stroke();
                        
                        // 绘制数据点
                        for (let j = 0; j < displayPoints; j++) {
                            const dataIndex = j * step;
                            const x = centerX + ((xData[dataIndex] - adjustedXMin) / adjustedXRange) * width;
                            const y = 20 + height - ((yData[dataIndex] - adjustedYMin) / adjustedYRange) * height;
                            
                            ctx.beginPath();
                            ctx.arc(x, y, 3, 0, 2 * Math.PI);
                            ctx.fillStyle = color;
                            ctx.fill();
                            ctx.strokeStyle = color;
                            ctx.lineWidth = 1;
                            ctx.stroke();
                        }
                    }
                    
                    // 绘制图例
                    const legendX = canvas.width - 180;
                    const legendY = 30;
                    const legendItemHeight = 20;
                    
                    ctx.font = '12px Arial';
                    ctx.fillStyle = '#333';
                    ctx.fillText('图例:', legendX, legendY);
                    
                    for (let i = 0; i < yColumnNames.length; i++) {
                        const y = legendY + (i + 1) * legendItemHeight;
                        
                        // 绘制颜色方块
                        ctx.fillStyle = colorPalette[i % colorPalette.length];
                        ctx.fillRect(legendX, y - 8, 12, 12);
                        
                        // 绘制列名称
                        ctx.fillStyle = '#333';
                        ctx.fillText(yColumnNames[i], legendX + 20, y);
                    }
                } else {
                    // 不同图表模式
                    for (let i = 0; i < yDataArray.length; i++) {
                        const yData = yDataArray[i];
                        const yColumnName = yColumnNames[i];
                        
                        // 创建图表容器
                        const chartContainer = document.createElement('div');
                        chartContainer.style.marginBottom = '30px';
                        waveDisplay.appendChild(chartContainer);
                        
                        // 创建图表标题
                        const chartTitle = document.createElement('h3');
                        chartTitle.textContent = `Y轴: ${yColumnName}`;
                        chartTitle.style.textAlign = 'center';
                        chartContainer.appendChild(chartTitle);
                        
                        // 创建画布
                        const canvas = document.createElement('canvas');
                        canvas.width = 1000;
                        canvas.height = 300;
                        chartContainer.appendChild(canvas);
                        
                        const ctx = canvas.getContext('2d');
                        
                        // 绘制坐标轴
                        const centerY = canvas.height / 2;
                        const centerX = 50;
                        const width = canvas.width - 100;
                        const height = canvas.height - 40;
                        
                        // 确定X轴数据范围
                        const xMax = Math.max(...xData);
                        const xMin = Math.min(...xData);
                        const xRange = xMax - xMin;
                        
                        // 确定Y轴数据范围
                        const yMax = Math.max(...yData);
                        const yMin = Math.min(...yData);
                        const yRange = yMax - yMin;
                        
                        // 添加一些边距，确保所有数据点都能显示
                        const xPadding = xRange * 0.1;
                        const yPadding = yRange * 0.1;
                        const adjustedXMin = xMin - xPadding;
                        const adjustedXMax = xMax + xPadding;
                        const adjustedYMin = yMin - yPadding;
                        const adjustedYMax = yMax + yPadding;
                        const adjustedXRange = adjustedXMax - adjustedXMin;
                        const adjustedYRange = adjustedYMax - adjustedYMin;
                        
                        // 绘制坐标轴
                        ctx.beginPath();
                        ctx.moveTo(centerX, 20);
                        ctx.lineTo(centerX, canvas.height - 20);
                        ctx.lineTo(canvas.width - 20, canvas.height - 20);
                        ctx.strokeStyle = '#333';
                        ctx.lineWidth = 1;
                        ctx.stroke();
                        
                        // 绘制网格
                        ctx.strokeStyle = '#eee';
                        ctx.lineWidth = 0.5;
                        
                        // 水平网格线和刻度
                        const ySteps = 10;
                        for (let j = 0; j <= ySteps; j++) {
                            const y = 20 + (j * height / ySteps);
                            ctx.beginPath();
                            ctx.moveTo(centerX, y);
                            ctx.lineTo(canvas.width - 20, y);
                            ctx.stroke();
                            
                            // 绘制Y轴刻度
                            const value = adjustedYMax - (j * adjustedYRange / ySteps);
                            ctx.fillStyle = '#333';
                            ctx.font = '10px Arial';
                            ctx.textAlign = 'right';
                            ctx.fillText(value.toFixed(2), centerX - 5, y + 3);
                        }
                        
                        // 垂直网格线和刻度
                        const xSteps = 10;
                        for (let j = 0; j <= xSteps; j++) {
                            const x = centerX + (j * width / xSteps);
                            ctx.beginPath();
                            ctx.moveTo(x, 20);
                            ctx.lineTo(x, canvas.height - 20);
                            ctx.stroke();
                            
                            // 绘制X轴刻度
                            const value = adjustedXMin + (j * adjustedXRange / xSteps);
                            ctx.fillStyle = '#333';
                            ctx.font = '10px Arial';
                            ctx.textAlign = 'center';
                            ctx.fillText(value.toFixed(2), x, canvas.height - 5);
                        }
                        
                        // 提取数据类型
                        const typeData = [];
                        if (typeColumn !== -1) {
                            for (let j = startRow; j < jsonData.length; j++) {
                                const typeValue = jsonData[j][typeColumn];
                                typeData.push(typeValue ? String(typeValue) : '未知');
                            }
                        } else {
                            // 如果没有数据类型列，为所有点设置默认类型
                            for (let j = 0; j < jsonData.length - startRow; j++) {
                                typeData.push('默认');
                            }
                        }
                        
                        // 为不同数据类型分配颜色
                        const typeColors = {};
                        const uniqueTypes = [...new Set(typeData)];
                        uniqueTypes.forEach((type, index) => {
                            typeColors[type] = colorPalette[index % colorPalette.length];
                        });
                        
                        // 先绘制连接线（按原始顺序，保持数据点之间的连接关系）
                        ctx.beginPath();
                        for (let j = 0; j < displayPoints; j++) {
                            const dataIndex = j * step;
                            const x = centerX + ((xData[dataIndex] - adjustedXMin) / adjustedXRange) * width;
                            const y = 20 + height - ((yData[dataIndex] - adjustedYMin) / adjustedYRange) * height;
                            
                            if (j === 0) {
                                ctx.moveTo(x, y);
                            } else {
                                ctx.lineTo(x, y);
                            }
                        }
                        ctx.strokeStyle = '#333'; // 使用默认颜色绘制连接线
                        ctx.lineWidth = 1;
                        ctx.stroke();
                        
                        // 按数据类型绘制数据点
                        for (let j = 0; j < displayPoints; j++) {
                            const dataIndex = j * step;
                            const x = centerX + ((xData[dataIndex] - adjustedXMin) / adjustedXRange) * width;
                            const y = 20 + height - ((yData[dataIndex] - adjustedYMin) / adjustedYRange) * height;
                            const pointType = typeData[dataIndex];
                            const color = typeColors[pointType];
                            
                            // 绘制数据点
                            ctx.beginPath();
                            ctx.arc(x, y, 3, 0, 2 * Math.PI);
                            ctx.fillStyle = color;
                            ctx.fill();
                            ctx.strokeStyle = color;
                            ctx.lineWidth = 1;
                            ctx.stroke();
                        }
                        
                        // 绘制图例
                        if (uniqueTypes.length > 1) {
                            const legendX = canvas.width - 180;
                            const legendY = 30;
                            const legendItemHeight = 20;
                            
                            ctx.font = '12px Arial';
                            ctx.fillStyle = '#333';
                            ctx.fillText('图例:', legendX, legendY);
                            
                            uniqueTypes.forEach((type, index) => {
                                const y = legendY + (index + 1) * legendItemHeight;
                                
                                // 绘制颜色方块
                                ctx.fillStyle = typeColors[type];
                                ctx.fillRect(legendX, y - 8, 12, 12);
                                
                                // 绘制类型名称
                                ctx.fillStyle = '#333';
                                ctx.fillText(type, legendX + 20, y);
                            });
                        }
                    }
                }
                
                // 更新XY图信息
                const html = `
                    <h3>XY图信息</h3>
                    <div class="card">
                        <p><strong>数据点数:</strong> ${xData.length}</p>
                        <p><strong>X轴范围:</strong> ${Math.min(...xData).toFixed(4)} - ${Math.max(...xData).toFixed(4)}</p>
                        <p><strong>Y轴数据列数:</strong> ${selectedYColumns.length}</p>
                        <p><strong>显示点数:</strong> ${displayPoints}</p>
                        <p><strong>显示模式:</strong> ${displayMode === 'single' ? '同一图表' : '不同图表'}</p>
                    </div>
                `;
                
                // 添加信息显示
                const infoDiv = document.createElement('div');
                infoDiv.className = 'data-display';
                infoDiv.innerHTML = '<p class="success">✅ XY图绘制成功！</p>' + html;
                waveDisplay.appendChild(infoDiv);
                
            } catch (error) {
                // 恢复原始画布
                waveDisplay.innerHTML = `
                    <canvas id="xyCanvas" width="1000" height="400"></canvas>
                    <div id="xyInfo" class="data-display">
                        <p class="error">❌ 绘制失败: ${error.message}</p>
                    </div>
                `;
            }
        }

        // 清除表单
        function clearForm() {
            document.getElementById('fileInput').value = '';
            document.getElementById('sheetSelector').style.display = 'none';
            document.getElementById('xColumn').innerHTML = '';
            document.getElementById('yColumns').innerHTML = '';
            document.getElementById('typeColumn').innerHTML = '<option value="-1">不使用数据类型</option>';
            document.getElementById('paramsForm').reset();
            
            // 恢复原始画布和信息显示
            const waveDisplay = document.querySelector('.wave-display');
            waveDisplay.innerHTML = `
                <canvas id="xyCanvas" width="1000" height="400"></canvas>
                <div id="xyInfo" class="data-display">
                    <p class="loading">请上传文件并设置参数后绘制XY图</p>
                </div>
            `;
            
            // 重置全局变量
            workbook = null;
            worksheet = null;
            xData = [];
            yData = [];
        }
    </script>
</body>
</html>
