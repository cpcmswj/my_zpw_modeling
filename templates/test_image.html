<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>测试图片页面</title>
    <style>
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        h1 {
            text-align: center;
        }
        img {
            max-width: 100%;
            height: auto;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>测试图片页面</h1>
        <p>这是一个测试页面，用于检查图片查看器的问题。</p>
        <img src="/static/images/错误展示0.png" alt="测试图片">
        <select id="imageSelect" onchange="changeImage()">
            <option value="0">0 - 无故障</option>
            <option value="1">1 - 接收端调谐单元1断路</option>
        </select>
        <script>
            function changeImage() {
                const select = document.getElementById('imageSelect');
                const image = document.querySelector('img');
                image.src = `/static/images/错误展示${select.value}.png`;
                image.alt = `测试图片${select.value}`;
            }
        </script>
    </div>
</body>
</html>
